<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로고드 | Logo Design Studio</title>
    
    <!-- Open Graph 메타태그 추가 -->
    <meta property="og:title" content="로고드 | Logo Design Studio">
    <meta property="og:description" content="전문적인 로고 디자인 서비스">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logod-card-02.jpg">
    <meta name="description" content="전문적인 로고 디자인 서비스">
    <meta name="keywords" content="로고, 디자인, 브랜딩, 로고디자인">
    <meta name="author" content="로고드">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            flex-direction: column;
        }

        .content {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 2px 40px rgba(0, 0, 0, 0.05);
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 280px;
        }

        .button {
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .button:hover {
            opacity: 0.9;
        }

        .button:active {
            transform: translateY(1px);
        }

        .button-1 { background-color: #95B8F6; }
        .button-2 { background-color: #98E5BE; }
        .button-3 { background-color: #FF9999; }
        .button-4 { background-color: #B5A1E5; }
        .button-4:hover { opacity: 0.9; }

        .heading {
            font-size: 28px;
            font-weight: 800;
            color: #191F28;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .heading span {
            display: block;
            font-size: 16px;
            font-weight: 500;
            color: #8B95A1;
            margin-top: 8px;
        }

        /* 로고 이미지를 위한 스타일 추가 */
        .logo-image {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="logod-card-02.jpg" alt="로고드 로고" class="logo-image">
        <div class="heading">
            로고드
            <span>Logo Design Studio</span>
        </div>
        <div class="button-container">
            <a href="https://blog.naver.com/ccw2316" class="button button-1">네이버 블로그</a>
            <a href="https://smartstore.naver.com/chaewoo/products/9332441571" class="button button-2">네이버 스마트스토어</a>
            <a href="https://kmong.com/gig/447758" class="button button-3">크몽 로고</a>
            <a href="https://kmong.com/gig/612644" class="button button-4">크몽 인쇄</a>
        </div>
    </div>
</body>
</html>
